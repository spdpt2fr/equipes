<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Tests unitaires - Équipes</title>
  <link rel="stylesheet" href="https://unpkg.com/mocha/mocha.css">
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;padding:16px}
    #erreurs-js { background:#fce4ec; border-left:4px solid #c62828; padding:12px 16px; margin-bottom:16px; border-radius:6px; display:none; }
    #erreurs-js h3 { color:#c62828; margin:0 0 8px; }
    #erreurs-js pre { font-size:12px; white-space:pre-wrap; margin:4px 0; }
    /* Fake status element pour éviter les erreurs updateStatus() */
    #status { display:none; }
  </style>
</head>
<body>
  <div id="status"></div>
  <h1>Tests unitaires (Mocha + Chai)</h1>
  <div id="erreurs-js"><h3>⚠️ Erreurs JavaScript capturées</h3><div id="erreurs-list"></div></div>
  <div id="mocha"></div>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      const box = document.getElementById('erreurs-js');
      box.style.display = 'block';
      const pre = document.createElement('pre');
      pre.textContent = (src || '') + ':' + line + '\n' + msg + (err && err.stack ? '\n' + err.stack : '');
      document.getElementById('erreurs-list').appendChild(pre);
    };
    window.addEventListener('unhandledrejection', function(e) {
      const box = document.getElementById('erreurs-js');
      box.style.display = 'block';
      const pre = document.createElement('pre');
      pre.textContent = 'Promise rejetée : ' + (e.reason && e.reason.stack ? e.reason.stack : e.reason);
      document.getElementById('erreurs-list').appendChild(pre);
    });
  </script>

  <script src="https://unpkg.com/mocha/mocha.js"></script>
  <script src="chai.js"></script>
  <script>mocha.setup('bdd');</script>

  <!-- Charger le coeur puis les modules nécessaires -->
  <script src="../assets/js/core.js?v=5"></script>
  <script src="../assets/js/teams.js?v=5"></script>
  <!-- Mock minimal AppStorage pour sessions.js -->
  <script>
    window.AppStorage = { getTableName: function() { return 'players_test'; } };
    // AppCore.clubActuel requis par afficherHistorique
    if (!window.AppCore.clubActuel) window.AppCore.clubActuel = { id: 1, nom: 'Test' };
  </script>
  <script src="../assets/js/sessions.js?v=5"></script>

  <!-- Tests -->
  <script src="tests.js?v=5"></script>

  <script>
    // Lancer Mocha après le chargement des tests
    if (window.mocha) mocha.run();
  </script>
</body>
</html>
