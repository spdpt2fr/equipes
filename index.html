<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionnaire d'Équipes - Hockey Subaquatique</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <!-- Styles CSS modulaires -->
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
    <div id="status" class="status connecting">🔄 Connexion...</div>
    
    <div class="container">
        <!-- Titre principal -->
        <header class="header-banner">
            <div class="header-banner__text">
                <h1 class="header-banner__title">GESTIONNAIRE D'ÉQUIPES DE HOCKEY SUBAQUATIQUE</h1>
                <p class="header-banner__subtitle">Hockey Subaquatique · Grenoble &amp; Jeeves</p>
            </div>
            <div class="header-banner__illustration" aria-hidden="true">
                <img src="assets/images/diver-hockey-v2.png"
                     alt=""
                     width="200"
                     height="160"
                     loading="lazy"
                     class="header-banner__img">
            </div>
        </header>

        <!-- Navigation par onglets -->
        <nav class="tab-bar">
            <button class="tab-btn active" data-tab="gestion">🏒 Gestion</button>
            <button class="tab-btn" data-tab="historique">📅 Historique</button>
            <button class="tab-btn" data-tab="stats">📊 Stats</button>
        </nav>

        <div id="section-gestion" class="tab-section active">

        <!-- Sélecteur de Club -->
        <div class="club-selector">
            <div class="club-title">
                🏊‍♂️ Club actuel :
            </div>
            <select id="clubSelect">
                <option value="grenoble">🔵⚪🔴 Grenoble (France)</option>
                <option value="jeeves">🌊 Jeeves (UK)</option>
            </select>
            <div class="club-info" id="clubInfo">
                Chargement...
            </div>
        </div>

        <!-- Saisie des joueurs -->
        <div class="card">
            <h2 class="card-title">
                <span class="material-icons">person_add</span>
                Saisie des Joueurs
            </h2>
            <div class="form-grid">
                <div class="input-group">
                    <input id="nom" type="text" class="input-field" placeholder=" " required>
                    <label class="input-label">Nom du joueur</label>
                </div>
                <div class="input-group">
                    <input id="niveau" type="number" class="input-field" placeholder=" " min="1" max="10" step="0.1" required>
                    <label class="input-label">Niveau (1-10)</label>
                </div>
                <div class="input-group">
<select id="poste" class="input-field">
    <option value="indifferent">Indifférent</option>
    <option value="avant">Avant</option>
    <option value="arriere">Arrière</option>
    <option value="ailier">Ailier</option>
    <option value="centre">Centre</option>
    <option value="pivot">Pivot</option>
    <option value="arr_centre">Arr. Centre</option>
</select>
                </div>
                <div class="input-group">
                    <input id="groupe" type="number" class="input-field" placeholder=" " min="1">
                    <label class="input-label">Groupe (optionnel)</label>
                </div>
                <button id="ajouterBtn" class="btn btn-primary">
                    <span class="material-icons">add</span>
                    Ajouter Joueur
                </button>
            </div>
        </div>

        <!-- Import / Export et Actions -->
        <div class="card">
            <h2 class="card-title">
                <span class="material-icons">import_export</span>
                Import / Export et Actions
            </h2>
            <div class="actions-grid">
                <div class="file-input-wrapper">
                    <input accept=".txt,.csv" id="fichierJoueurs" type="file" style="display: none;">
                    <button type="button" class="btn btn-secondary" onclick="document.getElementById('fichierJoueurs').click();">
                        <span class="material-icons">upload_file</span>
                        Importer fichier
                    </button>
                </div>
                <button id="exportBtn" class="btn btn-secondary">
                    <span class="material-icons">download</span>
                    Exporter Joueurs
                </button>
                <button id="exportMatchsBtn" class="btn btn-secondary">
                    <span class="material-icons">emoji_events</span>
                    Exporter Matchs
                </button>
                <div class="file-input-wrapper">
                    <input accept=".json" id="fichierMatchs" type="file" style="display: none;">
                    <button type="button" class="btn btn-secondary" onclick="document.getElementById('fichierMatchs').click();">
                        <span class="material-icons">upload</span>
                        Importer Matchs
                    </button>
                </div>
                <button id="syncBtn" class="btn btn-warning">
                    <span class="material-icons">sync</span>
                    Synchroniser
                </button>
            </div>
        </div>

        <!-- Composition des équipes -->
        <div class="card">
            <h2 class="card-title">
                <span class="material-icons">groups</span>
                Composition des Équipes
            </h2>
            <div class="form-grid">
                <div class="input-group">
                    <input id="nombreEquipes" type="number" class="input-field" placeholder=" " min="1" required>
                    <label class="input-label">Nombre d'équipes</label>
                </div>
                <button id="creerBtn" class="btn btn-primary">
                    <span class="material-icons">group_add</span>
                    Créer Équipes
                </button>
            </div>
        </div>

        <!-- Liste des joueurs avec recherche -->
        <div class="card" id="listeJoueursCard" style="display: none;">
            <h2 class="card-title">
                <span class="material-icons">list</span>
                Liste des Joueurs
            </h2>
            
            <!-- Contrôles de recherche et tri -->
            <div class="search-controls">
                <div class="input-group search-input">
                    <input id="searchInput" type="text" class="input-field" placeholder=" ">
                    <label class="input-label">Rechercher un joueur...</label>
                </div>
                <button id="clearSearch" class="clear-search">
                    <span class="material-icons">clear</span>
                    Effacer
                </button>
                <div class="tri-toggle">
                    <button class="tri-btn active" data-tri="alpha">A → Z</button>
                    <button class="tri-btn" data-tri="niveau">Niveau ↓</button>
                </div>
                <div class="search-stats" id="searchStats"></div>
            </div>
            
            <div id="listeJoueurs" class="player-list"></div>
        </div>

        <!-- Équipes -->
        <div id="equipesContainer"></div>

        <!-- Résultats de la soirée (généré dynamiquement) -->
        <div id="resultatsContainer"></div>

        </div><!-- fin #section-gestion -->

        <!-- Historique des soirées -->
        <div id="section-historique" class="tab-section">
            <div id="historiqueContainer"></div>
        </div>

        <!-- Statistiques joueurs -->
        <div id="section-stats" class="tab-section">
            <div id="statsContainer"></div>
        </div>

    </div>

    <!-- Scripts JavaScript modulaires -->
    <script src="assets/js/core.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/clubs.js"></script>
    <script src="assets/js/players.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/teams.js"></script>
    <script src="assets/js/sessions.js"></script>

    <!-- Initialisation de l'application -->
    <script>
        // Initialisation globale de l'application
        window.onload = () => {
            console.log("🚀 Initialisation de l'application modulaire");
            
            // Initialiser l'application
            init();
            
            // Attacher les event listeners
            attachEventListeners();
            
            console.log("✅ Application initialisée avec succès");
        };
    </script>
</body>
</html>
